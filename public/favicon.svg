<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="esc-grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#2563eb" />
      <stop offset="100%" stopColor="#7c3aed" />
    </linearGradient>
    <linearGradient id="esc-grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#60a5fa" />
      <stop offset="100%" stopColor="#a78bfa" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="esc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background App Icon Style -->
  <rect x="0.75" y="0.75" width="34.5" height="34.5" rx="8" fill="#06060f" stroke="url(#esc-grad-primary)" stroke-width="1.5" stroke-opacity="0.7" />

  <!-- Logo Icon: Stylized Terminal Bracket & Monogram -->
  <g transform="translate(1, 0)">
    <!-- Left Bracket &lt; -->
    <path
      d="M 12 8 L 4 18 L 12 28"
      stroke="url(#esc-grad-primary)"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Diagonal Slash / -->
    <path
      d="M 20 6 L 14 30"
      stroke="#f8fafc"
      stroke-width="3.5"
      stroke-linecap="round"
      filter="url(#esc-glow)"
    />

    <!-- Right Bracket &gt; -->
    <path
      d="M 22 8 L 30 18 L 22 28"
      stroke="url(#esc-grad-primary)"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>